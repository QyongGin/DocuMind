services:
  mysql:
    image: mysql:8.4
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      TZ: Asia/Seoul
    expose:
      - "3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u root --password=\"$${MYSQL_ROOT_PASSWORD}\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ollama:
    image: ollama/ollama:latest
    expose:
      - "11434"
    environment:
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  chromadb:
    image: chromadb/chroma:1.0.0
    expose:
      - "8000"
    volumes:
      - chroma_data:/chroma/chroma
    environment:
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/8000'"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  ai-server:
    build: ./ai-server
    expose:
      - "8000"
    depends_on:
      chromadb:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://ollama:11434}
      OLLAMA_LLM_MODEL: ${OLLAMA_LLM_MODEL:-exaone3.5:7.8b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-qwen3-embedding:4b}
      OLLAMA_KEEP_ALIVE: ${OLLAMA_KEEP_ALIVE:-30m}
      OLLAMA_EMBEDDING_WARMUP_ON_STARTUP: ${OLLAMA_EMBEDDING_WARMUP_ON_STARTUP:-false}
      OLLAMA_NUM_CTX: ${OLLAMA_NUM_CTX:-4096}
      OLLAMA_NUM_PREDICT: ${OLLAMA_NUM_PREDICT:-512}
      OLLAMA_NUM_THREAD: ${OLLAMA_NUM_THREAD:-0}
      CHUNK_SIZE: ${CHUNK_SIZE:-800}
      CHUNK_OVERLAP: ${CHUNK_OVERLAP:-80}
      CHUNK_MERGE_MIN_SIZE: ${CHUNK_MERGE_MIN_SIZE:-300}
      TABLE_FACT_MAX_PER_CHUNK: ${TABLE_FACT_MAX_PER_CHUNK:-40}
      TABLE_FACT_MAX_CHARS: ${TABLE_FACT_MAX_CHARS:-420}
      EMBED_TABLE_RAW_CHUNKS: ${EMBED_TABLE_RAW_CHUNKS:-true}
      EMBEDDING_BATCH_SIZE: ${EMBEDDING_BATCH_SIZE:-64}
      PDF_LAYOUT_MODE: ${PDF_LAYOUT_MODE:-off}
      LAYOUT_STORE_DIR: ${LAYOUT_STORE_DIR:-/app/layout_store}
      UPLOAD_READ_CHUNK_BYTES: ${UPLOAD_READ_CHUNK_BYTES:-1048576}
      AI_DEFAULT_TOP_K: ${AI_DEFAULT_TOP_K:-5}
      BM25_INDEX_MAX_ENTRIES: ${BM25_INDEX_MAX_ENTRIES:-50000}
      CHROMA_HOST: chromadb
      CHROMA_PORT: 8000
      TZ: Asia/Seoul
    volumes:
      - layout_store:/app/layout_store
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import os, urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3); urllib.request.urlopen(os.environ.get('OLLAMA_BASE_URL', 'http://localhost:11434').rstrip('/') + '/api/tags', timeout=3)\""]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s

  backend:
    build: ./backend
    expose:
      - "8080"
    depends_on:
      mysql:
        condition: service_healthy
      ai-server:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: prod
      FASTAPI_URL: http://ai-server:8000
      FASTAPI_CONNECT_TIMEOUT: ${FASTAPI_CONNECT_TIMEOUT:-5s}
      FASTAPI_RESPONSE_TIMEOUT: ${FASTAPI_RESPONSE_TIMEOUT:-20m}
      FASTAPI_STREAM_TIMEOUT: ${FASTAPI_STREAM_TIMEOUT:-20m}
      DOCUMENT_PROCESSING_ASYNC_ENABLED: ${DOCUMENT_PROCESSING_ASYNC_ENABLED:-true}
      DOCUMENT_PROCESSING_CORE_POOL_SIZE: ${DOCUMENT_PROCESSING_CORE_POOL_SIZE:-1}
      DOCUMENT_PROCESSING_MAX_POOL_SIZE: ${DOCUMENT_PROCESSING_MAX_POOL_SIZE:-1}
      DOCUMENT_PROCESSING_QUEUE_CAPACITY: ${DOCUMENT_PROCESSING_QUEUE_CAPACITY:-20}
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/documind
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      JWT_ACCESS_TOKEN_EXPIRATION: ${JWT_ACCESS_TOKEN_EXPIRATION:-24h}
      JWT_REFRESH_TOKEN_EXPIRATION: ${JWT_REFRESH_TOKEN_EXPIRATION:-7d}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:-http://localhost,http://127.0.0.1}
      CHAT_DEFAULT_TOP_K: ${CHAT_DEFAULT_TOP_K:-5}
      DOCUMIND_ADMIN_USERNAME: ${DOCUMIND_ADMIN_USERNAME:-}
      DOCUMIND_ADMIN_PASSWORD: ${DOCUMIND_ADMIN_PASSWORD:-}
      # 컨테이너 기본 타임존은 UTC. KST(UTC+9) 로그 출력을 위해 명시적으로 설정
      TZ: Asia/Seoul
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://localhost:8080/api/categories || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 45s

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-/api}
        VITE_DEFAULT_TOP_K: ${VITE_DEFAULT_TOP_K:-5}
    ports:
      - "${FRONTEND_HOST:-0.0.0.0}:${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -q --spider http://localhost/ || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 20s

volumes:
  mysql_data:
  ollama_data:
  chroma_data:
  layout_store:
