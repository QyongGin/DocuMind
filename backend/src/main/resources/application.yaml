spring:
  application:
    name: documind
  servlet:
    multipart:
      # 512MB: MVP 개발 중 파일 크기 제한 없이 테스트. 운영 배포 시 정책에 맞게 조정
      max-file-size: 512MB
      max-request-size: 512MB
  profiles:
    # 기본은 로컬 개발 프로파일이다. Docker 배포에서는 SPRING_PROFILES_ACTIVE=prod로 오버라이드한다.
    active: ${SPRING_PROFILES_ACTIVE:local}

server:
  port: 8080
  tomcat:
    # 512MB (바이트): Spring multipart 설정과 동일하게 맞춰 Tomcat 레벨 DoS 방어
    max-http-form-post-size: 536870912
    # Tomcat 11 기본값 512바이트를 초과하는 긴 Content-Type(DOCX 등) 처리를 위해 증가
    max-part-header-size: 4096

fastapi:
  # FastAPI 서버 URL. Docker에서는 환경변수 FASTAPI_URL로 오버라이드
  url: ${FASTAPI_URL:http://localhost:8000}
  # FastAPI 연결 타임아웃. Docker 네트워크 장애나 서버 다운을 빠르게 감지
  connect-timeout: ${FASTAPI_CONNECT_TIMEOUT:5s}
  # FastAPI 응답 타임아웃. 모델 cold start와 첫 토큰 생성 시간을 고려해 설정
  response-timeout: ${FASTAPI_RESPONSE_TIMEOUT:180s}
  # SSE 스트리밍 응답 타임아웃. 기본 5분, 더 긴 답변이 필요하면 환경변수 FASTAPI_STREAM_TIMEOUT으로 조정
  stream-timeout: ${FASTAPI_STREAM_TIMEOUT:5m}

chat:
  # 기본 검색 청크 수. 값이 클수록 답변 근거는 늘지만 검색·프롬프트·LLM 생성 비용도 증가한다.
  default-top-k: ${CHAT_DEFAULT_TOP_K:5}
  # Spring MVC SseEmitter 타임아웃. 기본 5분, 더 긴 답변이 필요하면 환경변수 CHAT_SSE_EMITTER_TIMEOUT으로 조정
  sse-emitter-timeout: ${CHAT_SSE_EMITTER_TIMEOUT:5m}
  # SSE streamId 임시 저장 TTL. GET EventSource 연결이 지연되면 만료된다.
  stream-session-ttl: ${CHAT_STREAM_SESSION_TTL:30s}
  # SSE streamId 임시 저장 최대 건수. 외부 gateway/IP rate limit과 함께 메모리 보호 장치로 사용한다.
  stream-session-max-entries: ${CHAT_STREAM_SESSION_MAX_ENTRIES:1000}

jwt:
  # HS256 최소 256bit(32자 이상) 필요. 기본값 없이 환경변수로만 주입한다.
  secret: ${JWT_SECRET}
  # Access Token 만료 시간. 24h, 30m처럼 단위가 드러나는 Duration 형식으로 설정한다.
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:24h}
  # Refresh Token 만료 시간. 운영에서는 환경변수 JWT_REFRESH_TOKEN_EXPIRATION으로 조정한다.
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:7d}

auth:
  # HTTPS 배포 시 true로 설정하면 refresh-token 쿠키에 Secure 속성을 추가한다.
  refresh-cookie-secure: ${AUTH_REFRESH_COOKIE_SECURE:false}

app:
  cors:
    # 브라우저 Origin 허용 목록. 운영 배포 주소는 환경변수 APP_CORS_ALLOWED_ORIGINS로만 추가한다.
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173,http://localhost:5174,http://127.0.0.1:5174,http://localhost}

documind:
  admin:
    bootstrap:
      # 최초 관리자 계정 생성용. 운영에서는 환경변수로만 주입하고 코드에 비밀번호를 저장하지 않는다.
      username: ${DOCUMIND_ADMIN_USERNAME:}
      password: ${DOCUMIND_ADMIN_PASSWORD:}
