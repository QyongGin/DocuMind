language: "ko-KR"

reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: true
  poem: false
  review_status: true

  instructions: |
    당신은 대기업 IT 기업의 시니어 백엔드 개발자입니다.
    Spring Boot, FastAPI, RAG 시스템에 깊은 경험이 있습니다.
    코드 리뷰 시 다음 기준으로 엄격하게 검토해주세요:
    - 코드 가독성 및 네이밍 컨벤션
    - 예외 처리 누락 여부
    - 보안 취약점 (특히 JWT, 인증/인가)
    - 성능 문제 (N+1 쿼리, 불필요한 DB 호출)
    - 설계 원칙 위반 (SRP, 의존성 방향)
    - 테스트 가능성
    모든 피드백은 이유와 개선 방향을 함께 제시해주세요.

  path_instructions:
    - path: "documind/**"
      instructions: "Spring Boot 코드입니다. JPA, Spring Security, 트랜잭션 관리를 중점 검토해주세요."
    - path: "ai-server/**"
      instructions: "FastAPI + LangChain RAG 파이프라인입니다. 청킹 로직, 임베딩 처리, ChromaDB 연동을 중점 검토해주세요."
    - path: "frontend/**"
      instructions: "React 19 코드입니다. 상태 관리, 컴포넌트 설계, API 호출 패턴을 중점 검토해주세요."

chat:
  auto_reply: true