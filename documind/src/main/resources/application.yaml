spring:
  application:
    name: documind
  servlet:
    multipart:
      # 단일 파일 최대 크기. PDF 문서 업로드 대응
      max-file-size: 50MB
      # 요청 전체 최대 크기
      max-request-size: 50MB
  datasource:
    url: jdbc:mysql://localhost:3306/documind
    username: root
    password: ritepa64
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
server:
  port: 8080

fastapi:
  # FastAPI 서버 URL. Docker에서는 환경변수 FASTAPI_URL로 오버라이드
  url: http://localhost:8000

jwt:
  # HS256 최소 256bit(32자 이상) 필요. 운영 환경에서는 환경변수로 교체
  secret: documind-secret-key-please-change-in-production-env
  # Access Token 만료 시간 (ms). 86400000 = 24시간
  expiration: 86400000
  # Refresh Token 만료 시간 (ms). 604800000 = 7일
  refresh-expiration: 604800000
